version: "3.8"

services:
  surrealdb:
    image: surrealdb/surrealdb:v2.2.1
    command: start --user root --pass root --bind 0.0.0.0:8000 file:/data/portfoliograph.db
    ports:
      - "8000:8000"
    volumes:
      - surreal_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASS=root
      - SURREAL_NS=portfoliograph
      - SURREAL_DB=portfoliograph
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-true}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-portfoliograph}
    depends_on:
      surrealdb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

volumes:
  surreal_data:
